<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechnoPreneur</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg sticky-top bg-primary">
        <div class="container">
            <a class="navbar-brand text-white" href="index.html">
                <h3>TechnoPreneur</h3>
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link text-white" href="index.html">Beranda</a>
                </div>
            </div>
        </div>
    </nav>


    <section class="login-section d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center align-items-center">


                <div class="col-md-7 text-center">
                    <img src="assets/logo.png" class="logo-login" alt="Logo">
                </div>


                <div class="col-md-5">
                    <div class="login-card p-4 shadow">
                        <h1 class="mb-4">Masuk Akun</h1>
                           <div class="mb-3">
                                <label>Username</label>
                                <input type="text" id="username" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Email</label>
                                <input type="email" id="email" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Password</label>
                                <input type="password" id="password" class="form-control" required>
                            </div>
                            <div class="d-flex justify-content-between">
                                <button onclick="register(event)" class="btn btn-primary col-md-12">Login</button> 
                            </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <footer class="bg-primary text-white py-3 text-center">
        <p class="mb-0">&copy; 2026 TAX & TECH Center</p>
    </footer>

    <script src="js/register.js"></script>

</body>

</html>
