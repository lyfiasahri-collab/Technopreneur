<!DOCTYPE html>
<html lang="id" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Sertifikasi</title>
    <link class="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body class="d-flex flex-column h-100 bg-success bg-opacity-25">
    
    <div class="flex-shrink-0">
        <nav class="navbar navbar-expand bg-primary navbar-dark px-4 justify-content-end gap-4">
            <a class="nav-link text-white fw-bold fs-6" href="user.html">Dashboard</a>
            <a class="nav-link text-white fw-bold fs-6" href="login.html">Logout</a>
        </nav>

        <div class="container my-5 p-4 bg-white shadow rounded">
            <h1 class="text-center mb-4 fw-bold text-uppercase fs-3 text-secondary">
                Daftar Riwayat Sertifikasi
            </h1>

            <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle">
                    <thead class="table-light text-center fw-bold">
                        <tr>
                            <th style="width: 5%;">No</th>
                            <th>Nama Sertifikasi</th>
                            <th>Biaya</th>
                            <th>Durasi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-riwayat">
                        </tbody>
                </table>
            </div>
            
            <button onclick="hapusSemuaRiwayat()" class="btn btn-danger btn-sm mt-3">Bersihkan Riwayat</button>
        </div>
    </div>

    <footer class="bg-primary text-white text-center py-3 fw-bold fs-6 mt-auto">
        &copy; COPYRIGHT BY TECNOPRENEUR
    </footer>

    <script src="js/bootstrap.bundle.min.js"></script>

    <script>
        function tampilkanData() {
            const tbody = document.getElementById('tabel-riwayat');

            let daftarRiwayat = JSON.parse(localStorage.getItem('riwayatSertifikasi')) || [];
            
           
            tbody.innerHTML = '';

            if (daftarRiwayat.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">Belum ada riwayat pendaftaran.</td></tr>`;
                return;
            }

            daftarRiwayat.forEach((item, index) => {
                let baris = `
                    <tr>
                        <td class="text-center">${index + 1}</td>
                        <td class="fw-semibold">${item.nama}</td>
                        <td>${item.harga}</td>
                        <td>${item.durasi}</td>
                    </tr>
                `;
                tbody.innerHTML += baris;
            });
        }

        function hapusSemuaRiwayat() {
            if(confirm("Apakah Anda yakin ingin menghapus semua riwayat?")) {
                localStorage.removeItem('riwayatSertifikasi');
                tampilkanData();
            }
        }

        window.onload = tampilkanData;
    </script>
</body>
</html>
